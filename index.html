<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />

    <!-- Favicon - Google Arama Sonuçları için Optimize Edildi -->
    <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48x48.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192x192.png" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#548c8d" />
    <link rel="manifest" href="/manifest.json" />
    <title>Koptay Hukuk Bürosu — Ankara</title>
    <meta name="description" content="Av. Murat Can Koptay - Koptay Hukuk Bürosu. Çankaya/Ankara." />

    <!-- Critical CSS - Inline for faster FCP -->
    <style>
      *{margin:0;padding:0;box-sizing:border-box}
      html{scroll-behavior:smooth}
      body{font-family:'Open Sans',sans-serif;line-height:1.6;color:#1f2937;background:#fff}
      .animate-spin{animation:spin 1s linear infinite}
      @keyframes spin{to{transform:rotate(360deg)}}
      .rounded-full{border-radius:9999px}
      .border-b-2{border-bottom-width:2px}
      .border-primary-600{border-color:rgb(70,114,118)}
      .min-h-screen{min-height:100vh}
      .flex{display:flex}
      .items-center{align-items:center}
      .justify-center{justify-content:center}
      .h-16{height:4rem}
      .w-16{width:4rem}
    </style>

    <!-- DNS Prefetch -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com">
    <link rel="dns-prefetch" href="https://fonts.gstatic.com">
    <link rel="dns-prefetch" href="https://www.googletagmanager.com">
    <link rel="dns-prefetch" href="https://www.clarity.ms">

    <!-- Preconnect to critical domains -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!--
      Logo preload kaldırıldı: 5 KB SVG zaten <header> içinde mount olur olmaz çekiliyor.
      Tüm sayfalarda statik preload yapmak makale ve hesaplama sayfalarında bandwidth israfıydı.
      Sayfaya özgü LCP image preload'u prerender.js build-time olarak HTML'e basıyor.
    -->

    <!-- Optimized font loading -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Open+Sans:wght@300;400;600&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet"></noscript>

    <!--
      Analytics (GA4 + Microsoft Clarity) yalnızca KULLANICI ONAYI sonrası
      yüklenir. CookieConsent komponenti onay durumuna göre
      window.__loadAnalytics() fonksiyonunu çağırır.
      - anonymize_ip = true (IP son okteti maskelenir)
      - allow_google_signals = false (cross-device kapalı)
      - Clarity default olarak metin/input maskeleme uygular.
    -->
    <script>
      window.dataLayer = window.dataLayer || [];
      window.gtag = function(){ window.dataLayer.push(arguments); };

      window.__analyticsLoaded = false;
      window.__loadAnalytics = function() {
        if (window.__analyticsLoaded) return;
        window.__analyticsLoaded = true;

        var gaScript = document.createElement('script');
        gaScript.async = true;
        gaScript.src = 'https://www.googletagmanager.com/gtag/js?id=G-8DQ21Q8GF9';
        document.head.appendChild(gaScript);
        window.gtag('js', new Date());
        window.gtag('config', 'G-8DQ21Q8GF9', {
          'anonymize_ip': true,
          'allow_google_signals': false,
          'allow_ad_personalization_signals': false
        });

        (function(c,l,a,r,i,t,y){
          c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
          t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
          y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
        })(window, document, "clarity", "script", "ugrdvpu2fw");
      };

      (function() {
        try {
          if (localStorage.getItem('cookieConsent') === 'accepted') {
            window.__loadAnalytics();
          }
        } catch (e) { }
      })();

      window.__initAnalytics = function() {};
      window.__initClarity = function() {};
    </script>
  </head>
  <body>
    <!--
      App boot skeleton: React mount olana kadar tarayıcının paint edebileceği
      minimal, gerçek-içerik benzeri yapı. Amacı:
       (a) FCP'yi düşürmek — boş body 4 sn beyaz ekran demekti
       (b) LCP "logo loader" olarak işaretlenmesin diye küçük tutulur
       (c) React mount olunca kendiliğinden silinir (App.jsx içinde)
      İçeriğin tamamı pure CSS, sıfır JS bağımlılığı.
    -->
    <div id="boot-skeleton" aria-hidden="true" style="position:fixed;top:0;left:0;right:0;background:#fff;z-index:1;">
      <div style="height:64px;background:#fff;border-bottom:1px solid #e5e7eb;display:flex;align-items:center;padding:0 1rem;">
        <div style="width:140px;height:20px;background:#e5e7eb;border-radius:4px;"></div>
        <div style="flex:1;"></div>
        <div style="width:80px;height:18px;background:#f3f4f6;border-radius:4px;"></div>
      </div>
      <div style="max-width:1200px;margin:2rem auto;padding:0 1rem;">
        <div style="height:32px;width:60%;background:#f3f4f6;border-radius:6px;margin-bottom:1rem;"></div>
        <div style="height:18px;width:40%;background:#f3f4f6;border-radius:4px;margin-bottom:2rem;"></div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
